    const url=`https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson&steps=false`;
    const res=await fetch(url,{signal:controller.signal});if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();

  }finally{clearTimeout(timer)}
}

function enterNextEdge(sh){if(sh.movementStatus!=='queued')return false;if(sh.currentEdgeIndex>=sh.edgeIds.length)return completeShipmentLeg(sh);const e=state.connections.find(x=>x.id===sh.edgeIds[sh.currentEdgeIndex]);if(!e){sh.waitingReason='Strecke nicht mehr vorhanden';return false}const occupied=state.usedCapacity[e.id]||0,trips=sh.trips||1;if(occupied+trips>e.capacity){sh.waitingReason=`Wartet in ${CITY[sh.currentNode]?.name||'Knoten'}: ${occupied}/${e.capacity} Fahrzeuge auf ${CITY[e.a].name}–${CITY[e.b].name}`;return false}state.usedCapacity[e.id]=occupied+trips;sh.edgeTotalMinutes=edgeTravelMinutes(e,sh.vehicleType);sh.edgeRemainingMinutes=sh.edgeTotalMinutes;sh.movementStatus='moving';sh.waitingReason='';return true}
function tryStartReturn(sh){const v=VEHICLES[sh.vehicleType],route=findPath(sh.destination,sh.home,sh.vehicleType);if(!v||!route){sh.waitingReason='Keine Rückverbindung verfügbar';return false}let cargoGood=null,cargoAmount=0;const maxCargo=(sh.trips||1)*v.load;if(sh.returnPolicy==='required'){const wanted=maxCargo,available=state.cities[sh.destination].inventory[sh.returnGood]||0;if(available<wanted){sh.waitingReason=`Wartet auf ${wanted} Pal. ${GOODS[sh.returnGood]?.name||'Rückfracht'} (${available} verfügbar)`;return false}cargoGood=sh.returnGood;cargoAmount=wanted}else if(sh.returnPolicy==='optional'){cargoGood=sh.returnGood;cargoAmount=Math.min(maxCargo,state.cities[sh.destination].inventory[sh.returnGood]||0)}const cost=transportCost(route,sh.vehicleType,sh.trips||1);if(state.cash<cost){sh.waitingReason='Wartet auf Kapital für die Rückfahrt';return false}if(cargoGood&&cargoAmount>0)state.cities[sh.destination].inventory[cargoGood]-=cargoAmount;state.cash-=cost;sh.from=sh.destination;sh.to=sh.home;sh.good=cargoGood;sh.amount=cargoAmount;sh.remainingMinutes=Math.max(1,Math.round(route.timeHours*60));sh.totalMinutes=sh.remainingMinutes;sh.path=route.path;sh.edgeIds=route.edges.map(e=>e.id);sh.phase='return';sh.movementStatus='queued';sh.currentEdgeIndex=0;sh.currentNode=sh.destination;sh.edgeRemainingMinutes=0;sh.edgeTotalMinutes=0;sh.waitingReason='Wartet auf freie Einfahrt zur Rückfahrt';return true}

  state.routes=(state.routes||[]).map(r=>{const v=VEHICLES[r.vehicleType]||VEHICLES.van,count=Math.max(1,Math.floor(r.vehicleCount||1)),cap=count*v.load;return {...r,amountPerDay:clampCargoAmount(r.amountPerDay||cap,cap),returnAmount:r.returnPolicy&&r.returnPolicy!=='empty'?clampCargoAmount(r.returnAmount||r.amountPerDay||cap,cap):0}});
  CITIES.forEach(c=>{const s=state.cities[c.id];if(!s.inventory)s.inventory={};if(!Number.isFinite(s.inventory.fish))s.inventory.fish=0;if(!s.demands)s.demands={};if(!s.demands.fish)s.demands.fish={need:0,max:Math.max(3,2+c.tier),mult:+(1.1+c.tier*.12).toFixed(2)};});
  const nextDayBtn=document.getElementById('nextDayBtn');if(nextDayBtn)nextDayBtn.textContent='Tag beenden';
}

function dispatchCore(from,to,good,amount,vehicleId,{silent=false,automatic=false,maxTrips=null,routeId=null,returnConfig=null}={}){const inv=state.cities[from].inventory,v=VEHICLES[vehicleId],route=findPath(from,to,vehicleId);if(!route||!v||!good)return {ok:false,reason:'Keine kompatible Verbindung'};if(!vehicleCanCarryGood(vehicleId,good))return {ok:false,reason:'Dieses Fahrzeug ist für diese Ware ungeeignet'};const ret=returnConfig||{policy:'empty',good:null,amount:0};if((ret.policy||'empty')!=='empty'&&ret.good&&!vehicleCanCarryGood(vehicleId,ret.good))return {ok:false,reason:'Rückfracht passt nicht zum gewählten Fahrzeug'};const requestedTrips=Math.max(1,maxTrips||Math.ceil(Math.max(1,amount)/v.load)),trips=requestedTrips,routeCapacity=Math.min(...route.edges.map(e=>e.capacity));if(trips>routeCapacity)return {ok:false,reason:`Maximal ${routeCapacity} Fahrzeuge können diese Route gleichzeitig befahren`};const maxCargo=trips*v.load,actualAmount=clampCargoAmount(amount,maxCargo),actualReturn=(ret.policy&&ret.policy!=='empty')?clampCargoAmount(ret.amount||actualAmount,maxCargo):0,cost=transportCost(route,vehicleId,trips);if((inv[good]||0)<actualAmount)return {ok:false,reason:`Es werden ${actualAmount} Paletten benötigt`};const owned=state.fleet[vehicleId]||0,used=state.usedVehicles[vehicleId]||0;if(automatic){if(used+trips>owned)return {ok:false,reason:'Nicht genug Fahrzeuge im Fuhrpark'}}else if(trips>manualVehicleAvailable(vehicleId))return {ok:false,reason:'Nicht genug freie Fahrzeuge'};if(state.cash<cost)return {ok:false,reason:'Zu wenig Kapital für Betriebskosten'};inv[good]-=actualAmount;state.cash-=cost;state.usedVehicles[vehicleId]=(state.usedVehicles[vehicleId]||0)+trips;const travelMinutes=Math.max(1,Math.round(route.timeHours*60));state.shipments.push({id:'s'+Date.now()+Math.random().toString(16).slice(2),home:from,destination:to,from,to,good,amount:actualAmount,remainingMinutes:travelMinutes,totalMinutes:travelMinutes,path:route.path,edgeIds:route.edges.map(e=>e.id),vehicleType:vehicleId,routeId,trips,phase:'outbound',returnPolicy:ret.policy||'empty',returnGood:ret.good||null,returnAmount:actualReturn,waitingReason:'Wartet auf freie Einfahrt',movementStatus:'queued',currentEdgeIndex:0,currentNode:from,edgeRemainingMinutes:0,edgeTotalMinutes:0});if(!silent)toast(`${v.icon} Rundfahrt eingeplant: ${actualAmount} ${GOODS[good].name}.`,'good');return {ok:true,cost,trips,amount:actualAmount}}
function dispatch(from,to,good,amount,vehicleId,vehicleCount,returnConfig){const result=dispatchCore(from,to,good,amount,vehicleId,{maxTrips:Math.max(1,Math.floor(vehicleCount||1)),returnConfig});if(!result.ok)toast(result.reason+'.','bad');renderAll()}
function createPersistentRoute(from,to,good,amount,vehicleType,vehicleCount,returnPolicy='empty',returnGood=null,returnAmount=0){vehicleCount=Math.max(1,Math.floor(vehicleCount||1));const v=VEHICLES[vehicleType],timing=routeTiming(from,to,vehicleType);if(!v||!timing.out||!timing.back)return toast('Keine kompatible Hin- und Rückverbindung für diesen Fahrzeugtyp.','bad');if(!vehicleCanCarryGood(vehicleType,good))return toast('Diese Ware benötigt ein geeignetes Fahrzeug.','bad');if(returnPolicy!=='empty'&&returnGood&&!vehicleCanCarryGood(vehicleType,returnGood))return toast('Diese Rückfracht benötigt ein geeignetes Fahrzeug.','bad');const routeCapacity=Math.min(...timing.out.edges.map(e=>e.capacity),...timing.back.edges.map(e=>e.capacity));if(vehicleCount>routeCapacity)return toast(`Diese Route erlaubt maximal ${routeCapacity} Fahrzeuge gleichzeitig.`,'bad');const maxCargo=vehicleCount*v.load,chosenAmount=clampCargoAmount(amount,maxCargo),chosenReturn=returnPolicy==='empty'?0:clampCargoAmount(returnAmount||chosenAmount,maxCargo);if(returnPolicy!=='empty'&&!returnGood)return toast('Bitte eine Rückfracht auswählen.','bad');if(reservedVehicles(vehicleType)+vehicleCount>(state.fleet[vehicleType]||0))return toast('Nicht genug Fahrzeuge im Fuhrpark, um diese Route dauerhaft zu reservieren.','bad');state.routes.push({id:'r'+Date.now()+Math.random().toString(16).slice(2),from,to,good,amountPerDay:chosenAmount,vehicleType,vehicleCount,returnPolicy,returnGood:returnPolicy==='empty'?null:returnGood,returnAmount:chosenReturn,active:true,lastStatus:'Bereit für den nächsten Tagesstart'});toast('Dauerroute wurde aktiviert. Menge standardmäßig auf Kapazität gesetzt, bleibt aber editierbar.','good');save(false);renderAll()}
function runPersistentRoutes(){let sent=0,blocked=0;for(const r of state.routes){if(!r.active)continue;const v=VEHICLES[r.vehicleType],busy=routeBusyTrips(r.id);if(busy>0){r.lastStatus='Fahrzeuge noch auf Hin- oder Rückfahrt';blocked++;continue}const timing=routeTiming(r.from,r.to,r.vehicleType);if(!timing.out||!timing.back){r.lastStatus='Keine kompatible Rundverbindung';blocked++;continue}const routeCapacity=Math.min(...timing.out.edges.map(e=>e.capacity),...timing.back.edges.map(e=>e.capacity)),count=Math.min(r.vehicleCount,routeCapacity),maxCargo=count*v.load;r.vehicleCount=count;r.amountPerDay=clampCargoAmount(r.amountPerDay||maxCargo,maxCargo);if(r.returnPolicy!=='empty')r.returnAmount=clampCargoAmount(r.returnAmount||r.amountPerDay,maxCargo);const available=state.cities[r.from].inventory[r.good]||0;if(available<r.amountPerDay){r.lastStatus=`Wartet auf ${r.amountPerDay} Paletten`;blocked++;continue}const result=dispatchCore(r.from,r.to,r.good,r.amountPerDay,r.vehicleType,{silent:true,automatic:true,maxTrips:count,routeId:r.id,returnConfig:{policy:r.returnPolicy||'empty',good:r.returnGood||null,amount:r.returnAmount||0}});if(result.ok){r.lastStatus=`Eingeplant · ${r.amountPerDay} Pal. · Rundlauf ${formatHours(timing.round)} plus mögliche Wartezeit`;sent+=result.amount}else{r.lastStatus=result.reason;blocked++}}return{sent,blocked}}
function tryStartReturn(sh){const v=VEHICLES[sh.vehicleType],route=findPath(sh.destination,sh.home,sh.vehicleType);if(!v||!route){sh.waitingReason='Keine Rückverbindung verfügbar';return false}let cargoGood=null,cargoAmount=0;const maxCargo=(sh.trips||1)*v.load,wanted=Math.min(maxCargo,Math.max(0,Math.floor(sh.returnAmount||maxCargo)));if(sh.returnPolicy==='required'){const available=state.cities[sh.destination].inventory[sh.returnGood]||0;if(available<wanted){sh.waitingReason=`Wartet auf ${wanted} Pal. ${GOODS[sh.returnGood]?.name||'Rückfracht'} (${available} verfügbar)`;return false}cargoGood=sh.returnGood;cargoAmount=wanted}else if(sh.returnPolicy==='optional'){cargoGood=sh.returnGood;cargoAmount=Math.min(wanted,state.cities[sh.destination].inventory[sh.returnGood]||0)}const cost=transportCost(route,sh.vehicleType,sh.trips||1);if(state.cash<cost){sh.waitingReason='Wartet auf Kapital für die Rückfahrt';return false}if(cargoGood&&cargoAmount>0)state.cities[sh.destination].inventory[cargoGood]-=cargoAmount;state.cash-=cost;sh.from=sh.destination;sh.to=sh.home;sh.good=cargoGood;sh.amount=cargoAmount;sh.remainingMinutes=Math.max(1,Math.round(route.timeHours*60));sh.totalMinutes=sh.remainingMinutes;sh.path=route.path;sh.edgeIds=route.edges.map(e=>e.id);sh.phase='return';sh.movementStatus='queued';sh.currentEdgeIndex=0;sh.currentNode=sh.destination;sh.edgeRemainingMinutes=0;sh.edgeTotalMinutes=0;sh.waitingReason='Wartet auf freie Einfahrt zur Rückfahrt';return true}

function renderCompany(root){
  const unlocked=Object.values(state.cities).filter(c=>c.unlocked).length;
  const fac=Object.values(state.cities).reduce((sum,c)=>sum+c.facilities.length,0);
  const networkMaint=state.connections.reduce((sum,e)=>sum+e.maintenance,0);
  const facilityMaint=fac*550;
  const fleetMaint=Object.entries(state.fleet).reduce((sum,[id,n])=>sum+(VEHICLES[id]?.daily||0)*n,0);
  const maint=networkMaint+facilityMaint+fleetMaint;
  const goals=[
    {t:'5 Orte erschließen',v:unlocked,m:5},
    {t:'10 Orte erschließen',v:unlocked,m:10},
    {t:'25 Orte erschließen',v:unlocked,m:25},
    {t:'50 Waren verkaufen',v:state.totalDelivered,m:50},
    {t:'CHF 1 Mio. Umsatz',v:state.totalRevenue,m:1000000}
  ];
  root.innerHTML+=`<section class="card"><h2>Unternehmen</h2><div class="mini-grid"><div class="metric"><b>${unlocked}</b><span>Orte</span></div><div class="metric"><b>${state.connections.length}</b><span>Linien</span></div><div class="metric"><b>${fleetTotal()}</b><span>Fahrzeuge</span></div><div class="metric"><b>${state.routes.filter(r=>r.active).length}</b><span>Dauerrouten</span></div></div></section>`;
  root.innerHTML+=`<section class="card vehicle-purchase-launch"><button class="btn primary full vehicle-purchase-button" onclick="window.HF.openVehicleShop()">🚚 Fahrzeugkauf</button></section>`;
  root.innerHTML+=`<section class="card"><h3>Finanzen</h3><div class="demand"><span>Netzunterhalt</span><b>${money(networkMaint)}</b></div><div class="demand"><span>Betriebe</span><b>${money(facilityMaint)}</b></div><div class="demand"><span>Fuhrpark</span><b>${money(fleetMaint)}</b></div><div class="demand"><span>Gesamt pro Tag</span><b>${money(maint)}</b></div><div class="demand"><span>Gesamtumsatz</span><b>${money(state.totalRevenue)}</b></div><div class="demand"><span>Verkaufte Paletten</span><b>${state.totalDelivered}</b></div><div class="demand"><span>Reputation</span><b>${state.reputation}</b></div></section>`;
  root.innerHTML+=`<section class="card"><h3>Meilensteine</h3>${goals.map(g=>`<div class="demand"><div style="width:100%"><div class="row"><b style="font-size:12px">${g.v>=g.m?'✓ ':''}${g.t}</b><small>${Math.min(g.v,g.m).toLocaleString('de-CH')}/${g.m.toLocaleString('de-CH')}</small></div><div class="bar"><i style="width:${clamp(g.v/g.m*100,0,100)}%"></i></div></div></div>`).join('')}</section>`;
  root.innerHTML+=`<section class="card"><h3>Spielstand</h3><div class="two"><button class="btn secondary" onclick="window.HF.save()">Speichern</button><button class="btn danger" onclick="window.HF.reset()">Neu starten</button></div></section>`;
}

function ensureFacilityConfigs(cityState){

function normalizedFoodMix(config){return clamp(Math.round(Number(config?.meatPct ?? 50)/5)*5,0,100)}
function normalizedFoodFactoryMix(config){
  let values;
  if(Number.isFinite(Number(config?.vegPct))||Number.isFinite(Number(config?.tomatoPct))){
    values=[Number(config?.meatPct)||0,Number(config?.vegPct)||0,Number(config?.tomatoPct)||0];
  }else if(config?.mode==='tomato') values=[0,0,100];

  const order=[0,1,2].sort((a,b)=>(scaled[b]-floored[b])-(scaled[a]-floored[a]));
  let i=0;while(remaining>0){floored[order[i%3]]+=5;remaining-=5;i++}

}
function foodFactoryRecipe(config){

    {pct:mix.vegPct,recipe:hfRecipeFromPack('foodfactory_veg')},

const HF_BULK_GOODS = new Set(['grain','ore','aluminum_ore']);
vehicleCanCarryGood = function(vehicleId,goodId){
  if(!vehicleId||!goodId||!GOODS[goodId]) return true;
  // Refrigerated goods need a dedicated refrigerated truck.
  if(goodId==='fish' || goodId==='pork') return vehicleId==='reefer';
  // Live animals need an appropriate livestock-capable vehicle.
  if(goodId==='pigs') return ['lightTruck','heavyTruck','artic','freightTrain'].includes(vehicleId);
  // Loose bulk cargo is reserved for the tipper truck on roads; rail remains possible.
  if(HF_BULK_GOODS.has(goodId)) return vehicleId==='tipper' || vehicleId==='freightTrain';
  // Tippers carry bulk cargo only, reefers carry chilled cargo only.
  if(vehicleId==='tipper' || vehicleId==='reefer') return false;
  return true;
};

const HF_WEEKDAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];

function weekdayIndex(day=state.day){return ((Math.max(1,Number(day)||1)-1)%7+7)%7}
function weekdayName(day=state.day){return HF_WEEKDAYS[weekdayIndex(day)]}
function minuteOfDay(hour=state.hour,minute=state.minute){return clamp((Number(hour)||0)*60+(Number(minute)||0),0,1439)}

function routeScheduleDays(route){const days=Array.isArray(route?.scheduleDays)?route.scheduleDays.map(Number).filter(x=>x>=0&&x<7):[0,1,2,3,4,5,6];return [...new Set(days)].sort((a,b)=>a-b)}

function routeScheduleLabel(route){const days=routeScheduleDays(route).map(d=>HF_WEEKDAYS[d]).join(', ');return `${days} · ${clockFromMinutes(routeDepartureMinute(route))}`}
function nextDepartureInfo(route){const nowDay=weekdayIndex(),nowMinute=minuteOfDay(),days=routeScheduleDays(route),depart=routeDepartureMinute(route);let best=null;for(let offset=0;offset<=7;offset++){const wd=(nowDay+offset)%7;if(!days.includes(wd))continue;if(offset===0&&depart<=nowMinute)continue;const delta=offset*1440+depart-nowMinute;if(best===null||delta<best)best=delta}if(best===null){const wd=days[0]??0;best=((wd-nowDay+7)%7||7)*1440+depart-nowMinute}const targetWd=(nowDay+Math.floor((nowMinute+best)/1440))%7;const parts=[];if(best>=1440)parts.push(`${Math.floor(best/1440)} T`);const rem=best%1440;if(rem>=60)parts.push(`${Math.floor(rem/60)} Std.`);if(rem%60)parts.push(`${rem%60} Min.`);return{delta:best,label:`${HF_WEEKDAYS[targetWd]} ${clockFromMinutes((nowMinute+best)%1440)}`,relative:parts.join(' ')||'jetzt'}}

function weeklyVehicleOccupancy(vehicleId,excludeId=null){const occupancy=new Uint16Array(HF_WEEK_MINUTES);for(const r of state.routes||[]){if(!r.active||r.vehicleType!==vehicleId||r.id===excludeId)continue;const duration=routeDurationMinutes(r),count=Math.max(1,Math.floor(r.vehicleCount||1));for(const day of routeScheduleDays(r))addRouteMinutes(occupancy,day*1440+routeDepartureMinute(r),duration,count)}return occupancy}
function scheduleCapacityCheck(vehicleId,day,departureMinute,duration,count,excludeId=null){const owned=Math.max(0,state.fleet?.[vehicleId]||0),occ=weeklyVehicleOccupancy(vehicleId,excludeId);let peak=0,firstConflict=-1,cursor=day*1440+departureMinute;for(let i=0;i<Math.max(1,Math.ceil(duration));i++){const at=((cursor+i)%HF_WEEK_MINUTES+HF_WEEK_MINUTES)%HF_WEEK_MINUTES,used=occ[at]+count;peak=Math.max(peak,used);if(firstConflict<0&&used>owned)firstConflict=at}return{ok:firstConflict<0,owned,peak,firstConflict}}

// --- v1.0.30: automatic junctions when a new city can reuse an existing road ---
const HF_AUTO_JUNCTION_JOIN_KM_V130=0.12;
const HF_AUTO_JUNCTION_PREV_KM_V130=0.16;
const HF_AUTO_JUNCTION_MIN_REUSE_KM_V130=0.15;
const HF_AUTO_JUNCTION_ENDPOINT_KM_V130=0.18;

function hfRoadComponentEdgesV130(originId){
  const roads=state.connections.filter(e=>isRoadType(e.type));
  const reached=new Set([originId]);
  let changed=true;
  while(changed){
    changed=false;
    for(const e of roads){
      if(reached.has(e.a)&&!reached.has(e.b)){reached.add(e.b);changed=true}
      else if(reached.has(e.b)&&!reached.has(e.a)){reached.add(e.a);changed=true}
    }
  }
  return roads.filter(e=>reached.has(e.a)&&reached.has(e.b));
}
function hfGeometryCumulativeV130(coords){
  const out=[0];
  for(let i=1;i<coords.length;i++)out[i]=out[i-1]+dist({lat:coords[i-1][0],lng:coords[i-1][1]},{lat:coords[i][0],lng:coords[i][1]});

function hfPointDistanceV130(a,b){return dist({lat:a[0],lng:a[1]},{lat:b[0],lng:b[1]})}

}

  const first=[hitPoint.lat,hitPoint.lng],rest=routeCoords.slice(index),same=rest.length&&hfPointDistanceV130(first,rest[0])<0.01;

    if(reusedDistance<HF_AUTO_JUNCTION_MIN_REUSE_KM_V130)continue;

    for(const item of prepared){
      const hit=closestPointOnGeometry(routePoint,item.geometry);
      if(!hit||hit.distance>HF_AUTO_JUNCTION_JOIN_KM_V130)continue;
      if(!hfRouteActuallySharesEdgeV130(coords,i,item.geometry,hit))continue;
      if(!best||hit.distance<best.hit.distance)best={...item,hit};
    }

// --- v1.1.5: durable persistence across Android app closes ---
const HF_PERSIST_DB='helveticFreightPersistentStore';
const HF_PERSIST_STORE='saves';
let hfPersistDbPromise=null;
let hfPersistReady=false;
let hfPersistentSaveAvailable=false;
let hfLastStateFingerprint='';
let hfWriteChain=Promise.resolve();

function hfOpenPersistentDb(){
  if(hfPersistDbPromise)return hfPersistDbPromise;
  hfPersistDbPromise=new Promise((resolve,reject)=>{
    let settled=false;
    const finish=(ok,value)=>{if(settled)return;settled=true;clearTimeout(timer);ok?resolve(value):reject(value)};
    const timer=setTimeout(()=>finish(false,new Error('IndexedDB antwortet nicht')),1800);
    try{
      if(!window.indexedDB)return finish(false,new Error('IndexedDB ist nicht verfügbar'));
      const request=indexedDB.open(HF_PERSIST_DB,1);
      request.onupgradeneeded=()=>{
        const db=request.result;
        if(!db.objectStoreNames.contains(HF_PERSIST_STORE))db.createObjectStore(HF_PERSIST_STORE);
      };
      request.onsuccess=()=>finish(true,request.result);
      request.onerror=()=>finish(false,request.error||new Error('IndexedDB konnte nicht geöffnet werden'));
      request.onblocked=()=>finish(false,new Error('IndexedDB ist blockiert'));
    }catch(err){finish(false,err)}
  });
  return hfPersistDbPromise;
}
function hfIdbGet(key){
  return hfOpenPersistentDb().then(db=>new Promise((resolve,reject)=>{
    try{
      const tx=db.transaction(HF_PERSIST_STORE,'readonly');
      const req=tx.objectStore(HF_PERSIST_STORE).get(key);
      req.onsuccess=()=>resolve(req.result??null);
      req.onerror=()=>reject(req.error||new Error('Persistenter Spielstand konnte nicht gelesen werden'));
    }catch(err){reject(err)}
  }));
}
function hfIdbSet(key,value){
  return hfOpenPersistentDb().then(db=>new Promise((resolve,reject)=>{
    try{
      const tx=db.transaction(HF_PERSIST_STORE,'readwrite');
      tx.objectStore(HF_PERSIST_STORE).put(String(value),key);
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>reject(tx.error||new Error('Persistenter Spielstand konnte nicht geschrieben werden'));
      tx.onabort=()=>reject(tx.error||new Error('Persistentes Speichern wurde abgebrochen'));
    }catch(err){reject(err)}
  }));
}
function hfIdbDeleteAll(){
  return hfOpenPersistentDb().then(db=>new Promise((resolve,reject)=>{
    try{
      const tx=db.transaction(HF_PERSIST_STORE,'readwrite');
      tx.objectStore(HF_PERSIST_STORE).clear();
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>reject(tx.error||new Error('Persistenter Spielstand konnte nicht gelöscht werden'));
      tx.onabort=()=>reject(tx.error||new Error('Löschen wurde abgebrochen'));
    }catch(err){reject(err)}
  })).catch(()=>false);
}
function hfRawEnvelopeInfo(raw){
  if(!raw)return null;
  try{
    const parsed=JSON.parse(raw),candidate=parsed?.state&&typeof parsed.state==='object'?parsed.state:parsed;
    if(!hfStateIsStructurallyValid(candidate))return null;
    return {raw,state:candidate,savedAt:Number.isFinite(Date.parse(parsed?.savedAt))?Date.parse(parsed.savedAt):0};
  }catch(_){return null}
}
function hfStateFingerprint(value){
  try{return JSON.stringify(value)}catch(_){return ''}
}
function hfCreateEnvelope(value){
  return JSON.stringify({schemaVersion:HF_SAVE_SCHEMA,buildVersion:window.hfCurrentBuildVersion?.()||window.HF_BUILD_VERSION||'1.1.38',savedAt:new Date().toISOString(),state:value});
}
function hfQueuePersistentWrite(payload){
  hfWriteChain=hfWriteChain.then(async()=>{
    try{
      const previous=await hfIdbGet('primary').catch(()=>null);
      if(previous&&previous!==payload)await hfIdbSet('backup1',previous);
      await hfIdbSet('primary',payload);
      await hfIdbSet('lastGood',payload);
      hfPersistentSaveAvailable=true;
    }catch(err){
      console.warn('IndexedDB-Sicherung nicht möglich',err);
    }
  });
  return hfWriteChain;
}

// Replace the old save routine. The synchronous localStorage copy stays as a fast cache;
// IndexedDB is the durable copy used when Android closes the WebView.
save=function(show=true){
  if(!window.__HF_BOOT_COMPLETE__){window.__HF_PENDING_SAVE__=true;return false;}
  try{
    if(!hfStateIsStructurallyValid(state))throw new Error('Spielzustand ist unvollständig');
    const snapshot=hfClone(state),fingerprint=hfStateFingerprint(snapshot);
    if(!fingerprint)throw new Error('Spielzustand konnte nicht serialisiert werden');
    const unchanged=fingerprint===hfLastStateFingerprint;
    const payload=hfCreateEnvelope(snapshot);
    let localOk=true;
    if(!unchanged || !hfSafeGet(HF_SAVE_KEY)){
      const current=hfSafeGet(HF_SAVE_KEY);
      if(current){
        const backup1=hfSafeGet(HF_SAVE_BACKUP_1_KEY);
        if(backup1)hfSafeSet(HF_SAVE_BACKUP_2_KEY,backup1);
        hfSafeSet(HF_SAVE_BACKUP_1_KEY,current);
      }
      localOk=hfSafeSet(HF_SAVE_TEMP_KEY,payload);
      const verify=localOk?hfRawEnvelopeInfo(hfSafeGet(HF_SAVE_TEMP_KEY)):null;
      if(!verify)localOk=false;
      if(localOk)localOk=hfSafeSet(HF_SAVE_KEY,payload);
      if(localOk){hfSafeSet(HF_SAVE_LAST_GOOD_KEY,payload);hfSafeRemove(HF_SAVE_TEMP_KEY)}
      else hfSafeRemove(HF_SAVE_TEMP_KEY);
      hfLastStateFingerprint=fingerprint;
      hfQueuePersistentWrite(payload);
    }
    window.__HF_PENDING_SAVE__=false;
    if(show)toast(localOk?'Spielstand dauerhaft gespeichert.':'Spielstand wird in der App-Sicherung gespeichert.','good');
    return localOk||!!window.indexedDB;
  }catch(err){
    console.warn('Speichern nicht möglich',err);
    if(show)toast('Speichern nicht möglich. Bitte App geöffnet lassen und erneut versuchen.','bad');
    return false;
  }
};

function hfInstallBundledEmptySave(){
  const keys=[HF_SAVE_KEY,HF_SAVE_LAST_GOOD_KEY,HF_SAVE_BACKUP_1_KEY,HF_SAVE_BACKUP_2_KEY];
  const valid=keys.some(key=>{try{return !!hfRawEnvelopeInfo(hfSafeGet(key))}catch(_){return false}});
  if(valid)return false;
  for(const key of [HF_SAVE_KEY,HF_SAVE_TEMP_KEY,HF_SAVE_LAST_GOOD_KEY,HF_SAVE_BACKUP_1_KEY,HF_SAVE_BACKUP_2_KEY])hfSafeRemove(key);
  const primaryOk=hfSafeSet(HF_SAVE_KEY,HF_BUNDLED_EMPTY_SAVE);
  const lastGoodOk=hfSafeSet(HF_SAVE_LAST_GOOD_KEY,HF_BUNDLED_EMPTY_SAVE);
  hfPersistentSaveAvailable=!!(primaryOk||lastGoodOk);
  return true;
}

async function hfRestoreBestPersistentState(){
  const localCandidates=[HF_SAVE_KEY,HF_SAVE_LAST_GOOD_KEY,HF_SAVE_BACKUP_1_KEY,HF_SAVE_BACKUP_2_KEY]
    .map(key=>hfRawEnvelopeInfo(hfSafeGet(key))).filter(Boolean);
  let idbCandidates=[];
  try{
    const raws=await Promise.all(['primary','lastGood','backup1'].map(key=>hfIdbGet(key).catch(()=>null)));
    idbCandidates=raws.map(hfRawEnvelopeInfo).filter(Boolean);
    hfPersistReady=true;
  }catch(err){
    hfPersistReady=false;
    console.warn('Persistenter App-Speicher nicht verfügbar',err);
  }
  const candidates=[...localCandidates,...idbCandidates].sort((a,b)=>b.savedAt-a.savedAt);
  hfPersistentSaveAvailable=candidates.length>0;
  if(!candidates.length)return false;
  for(const candidate of candidates){
    try{
      const migrated=migrateState(hfClone(candidate.state));
      if(!hfStateIsStructurallyValid(migrated))continue;
      state=migrated;
      hfLastStateFingerprint=hfStateFingerprint(state);
      return true;
    }catch(err){console.warn('Gesicherter Spielstand war nicht kompatibel',err)}
  }
  return false;
}

      try{

        location.reload();

    });
  }
  if(oldLoad){

}
function hfInstallAutosaveHooks(){
  if(window.__HF_AUTOSAVE_INSTALLED__)return;
  window.__HF_AUTOSAVE_INSTALLED__=true;
  let lastAuto=0,scheduled=null;
  const autosave=(force=false)=>{
    if(!window.__HF_BOOT_COMPLETE__)return false;
    const now=Date.now();
    if(!force&&now-lastAuto<800)return false;
    lastAuto=now;
    return save(false);
  };
  const schedule=()=>{
    if(scheduled)clearTimeout(scheduled);
    scheduled=setTimeout(()=>{scheduled=null;autosave(false)},450);
  };
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')autosave(true)},{passive:true});
  window.addEventListener('pagehide',()=>autosave(true),{passive:true});
  window.addEventListener('blur',()=>autosave(true),{passive:true});
  window.addEventListener('freeze',()=>autosave(true),{passive:true});
  document.addEventListener('click',()=>setTimeout(schedule,0),{passive:true});
  document.addEventListener('change',schedule,{passive:true});
  document.addEventListener('input',schedule,{passive:true});
  setInterval(()=>autosave(false),5000);
  window.__HF_FORCE_AUTOSAVE__=()=>autosave(true);
}

(async function hfBootV110(){
  try{
    const isExplicitNewGame=location.hash==='#hf-new-game-v110'||location.hash==='#hf-new-game-v115';
    const installedBundledStart=hfInstallBundledEmptySave();
    const restored=await hfRestoreBestPersistentState();
    const createdEmpty=!restored;
    if(createdEmpty){
      const bundledInfo=hfRawEnvelopeInfo(HF_BUNDLED_EMPTY_SAVE);
      state=bundledInfo?migrateState(hfClone(bundledInfo.state)):freshState();
      hfLastStateFingerprint='';
    }
    if(!hfStateIsStructurallyValid(state))throw new Error('Initialer Spielzustand unvollständig');
    hfV117AfterStateRestore();
    renderAll();
    const content=document.getElementById('content');
    if(!content||!content.childNodes.length)throw new Error('Hauptmenü wurde nicht gerendert');
    window.__HF_BOOT_COMPLETE__=true;
    document.documentElement.dataset.hfVersion='1.1.11';
    document.body.dataset.hfBuild='1.1.11';
    window.HF={...window.HF,
      bundledEmptySave:HF_BUNDLED_EMPTY_SAVE,
      resetToBundledStart:async()=>{for(const key of [HF_SAVE_KEY,HF_SAVE_TEMP_KEY,HF_SAVE_LAST_GOOD_KEY,HF_SAVE_BACKUP_1_KEY,HF_SAVE_BACKUP_2_KEY])hfSafeRemove(key);await hfIdbDeleteAll();hfInstallBundledEmptySave();location.reload()},
      stability:{schema:HF_SAVE_SCHEMA,key:HF_SAVE_KEY,transactional:true,backups:3,indexedDb:true,autosave:true,emptySaveBootstrap:true,bundledEmptySave:true,autosaveIntervalMs:5000},
      forceAutosave:()=>window.__HF_FORCE_AUTOSAVE__?.(),
      restoreLastGood:async function(){
        const raw=(await hfIdbGet('lastGood').catch(()=>null))||hfSafeGet(HF_SAVE_LAST_GOOD_KEY);if(!raw)return false;
        const info=hfRawEnvelopeInfo(raw);if(!info)return false;
        const recovered=migrateState(hfClone(info.state));if(!hfStateIsStructurallyValid(recovered))return false;
        state=recovered;renderAll();hfLastStateFingerprint='';save(false);return true;
      }
    };
    hfInstallAutosaveHooks();
    if(isExplicitNewGame){
      try{history.replaceState(null,'',location.href.split('#')[0])}catch(_){location.hash=''}
    }
    // Always write a valid save immediately. On a fresh install this creates the
    // empty initial save before the player can close or background the app.
    hfLastStateFingerprint='';
    const initialSaved=save(false);
    hfPersistentSaveAvailable=!!initialSaved||hfPersistentSaveAvailable;
    hfUpdateTitleInfo();
    hfInstallStableTitleController();
    // The bundled start save deliberately remains on the title screen so the
    // player can see that a loadable game is present before entering it.
  }catch(err){
    window.__HF_BOOT_COMPLETE__=false;
    hfShowFatalBootError(err);
  }
})();

    modal.classList.add('hf-v111-depot');

      scroll.style.overflowY='auto';scroll.style.overflowX='hidden';scroll.style.webkitOverflowScrolling='touch';scroll.style.touchAction='pan-y';scroll.style.minHeight='0';

  }

  const hfV111PriorOpenDepot=window.HF?.hfOpenDepot;
  if(hfV111PriorOpenDepot){
    window.HF.hfOpenDepot=function(id){

(function hfFoodFactoryRecipesV133(){
  'use strict';
  const BUILD='1.1.33',SCHEMA=133,EPS=.0001;
  const PACKAGED_OUTPUTS=new Set(['ravioli_meat','ravioli_veg','tomato_cans','canned_corn','canned_peas']);
  const round=v=>typeof roundCargo==='function'?roundCargo(Number(v)||0):Math.round((Number(v)||0)*1000)/1000;
  const clone=v=>v&&typeof v==='object'?JSON.parse(JSON.stringify(v)):v;

  function normalizePackagedOutputs(recipe){
    if(!recipe||recipe.facilityId!=='foodfactory')return recipe;
    recipe.inputs=recipe.inputs&&typeof recipe.inputs==='object'?recipe.inputs:{};

    const canKgPerPiece=Math.max(EPS,Number(GOOD_MEASURES?.cans?.kgPerUnit)||.08);
    let totalPieces=0;

      if(!PACKAGED_OUTPUTS.has(good))continue;
      const kgPerPiece=Math.max(EPS,Number(GOOD_MEASURES?.[good]?.kgPerUnit)||1);
      const pieces=Math.max(0,Math.round((Number(rawKg)||0)/kgPerPiece));
      recipe.outputs[good]=round(pieces*kgPerPiece);
      totalPieces+=pieces;
    }
    if(totalPieces>0)recipe.inputs.cans=round(totalPieces*canKgPerPiece);
    if(recipe.id==='foodfactory_meat'||recipe.mixField==='meatPct')recipe.inputs.grain=165;
    if(recipe.id==='foodfactory_veg'||recipe.mixField==='vegPct')recipe.inputs.grain=180;
    return recipe;
  }

    try{

      report.build=BUILD;report.foodFactoryRecipeSchema=SCHEMA;report.errors=[...(report.errors||[]),...packaging.errors];report.ok=report.errors.length===0;return report;
    };

    window.HF_CONTENT.foodFactoryRecipeSchema=SCHEMA;
    window.HF_CONTENT.packagingAudit=packagingAudit;
  }
  if(window.HF){
    if(window.HF_CONTENT?.applyContentPack)window.HF.applyContentPack=window.HF_CONTENT.applyContentPack;
    if(window.HF_CONTENT?.contentManifest)window.HF.exportContentManifest=window.HF_CONTENT.contentManifest;
    if(window.HF_CONTENT?.validate)window.HF.contentAudit=window.HF_CONTENT.validate;
    window.HF.foodFactoryPackagingAudit=packagingAudit;
    window.HF.foodFactoryRecipePreview=config=>clone(foodFactoryRecipe(config||{}));
    window.HF.hfV133={version:BUILD,recipeSchema:SCHEMA,oneCanPerOutput:true,ravioliGrainKg:{meat:165,veg:180}};
  }
