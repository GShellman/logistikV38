    const url=`https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=full&geometries=geojson&steps=false`;
    const res=await fetch(url,{signal:controller.signal});if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();

  }finally{clearTimeout(timer)}
}

// --- v13 / Android 1.0.3: physical cargo units, hourly production, visible locked-city demand ---
const PHYSICAL_UNITS_VERSION=1;
const HF_LEGACY_PHYSICAL_UNITS={food:{unit:'kg',kgPerUnit:1,step:10}};
const GOOD_MEASURES=Object.fromEntries([...(HF_BOOTSTRAP_CONTENT_PACK?.goods||[]).map(def=>[def.id,{unit:def.unit?.unit||'kg',kgPerUnit:Number(def.unit?.kgPerUnit)||1,step:Number(def.unit?.step)||1}]),...Object.entries(HF_LEGACY_PHYSICAL_UNITS)]);
const LEGACY_CARGO_KG=Object.fromEntries(Object.entries(GOOD_MEASURES).map(([id,m])=>[id,Number(m.kgPerUnit)||1]));
function roundCargo(v){return Math.round((Number(v)||0)*1000)/1000}
function measureFor(g){return GOOD_MEASURES[g]||{unit:'kg',kgPerUnit:1,step:1}}
function toDisplayAmount(g,kg){return (Number(kg)||0)/measureFor(g).kgPerUnit}
function fromDisplayAmount(g,value){return roundCargo((Number(value)||0)*measureFor(g).kgPerUnit)}
function displayDecimals(g,value){const m=measureFor(g);if(m.unit==='t')return Math.abs(value)<10?2:1;if(m.unit==='Stk.')return Math.abs(value)<100?1:0;return Math.abs(value)<10&&value%1?1:0}
function formatGoodAmount(g,kg){const m=measureFor(g),v=toDisplayAmount(g,kg),d=displayDecimals(g,v);return `${v.toLocaleString('de-CH',{minimumFractionDigits:0,maximumFractionDigits:d})} ${m.unit}`}
function formatWeight(kg){const n=Number(kg)||0;if(Math.abs(n)>=1000)return `${(n/1000).toLocaleString('de-CH',{maximumFractionDigits:Math.abs(n)<10000?2:1})} t`;return `${n.toLocaleString('de-CH',{maximumFractionDigits:n<10?1:0})} kg`}
function formatUnitPrice(g,mult=1){const m=measureFor(g),perUnit=(GOODS[g]?.price||0)*m.kgPerUnit*mult;return `${perUnit.toLocaleString('de-CH',{style:'currency',currency:'CHF',minimumFractionDigits:perUnit<100?2:0,maximumFractionDigits:perUnit<100?2:0})}/${m.unit}`}
function inputNumber(g,value){const m=measureFor(g),d=m.unit==='t'?2:(m.unit==='Stk.'?1:0);return Number(value.toFixed(d)).toString()}
function inputMaxFor(g,maxKg){const m=measureFor(g),raw=toDisplayAmount(g,maxKg);if(m.unit==='t')return Math.floor(raw*100)/100;if(m.unit==='Stk.')return Math.floor(raw*10)/10;return Math.floor(raw)}
function clampCargoAmount(amount,maxCap){const n=Math.max(.001,Number(amount)||.001);return Math.min(Number(maxCap)||n,roundCargo(n))}
function facilityFlowText(fid,hourly=true){const f=FACILITIES[fid];if(!f)return '';const div=hourly?24:1;const inputs=Object.entries(f.inputs||{}).map(([g,q])=>`${formatGoodAmount(g,q/div)} ${GOODS[g].name}`).join(' + ');const outputs=Object.entries(f.output||{}).map(([g,q])=>`${formatGoodAmount(g,q/div)} ${GOODS[g].name}`).join(' + ');return `${inputs?inputs+' → ':''}${outputs}${hourly?' / Std.':' / Tag'}`}
function applyPhysicalConstants(){
  Object.entries(GOODS).forEach(([g,x])=>{if(x.price&&!x._physicalPrice){x.price=x.price/(LEGACY_CARGO_KG[g]||1000);x._physicalPrice=true}});
  Object.values(FACILITIES).forEach(f=>{if(f._physicalRates)return;for(const [g,q] of Object.entries(f.inputs||{}))f.inputs[g]=roundCargo(q*(LEGACY_CARGO_KG[g]||1000));for(const [g,q] of Object.entries(f.output||{}))f.output[g]=roundCargo(q*(LEGACY_CARGO_KG[g]||1000));f._physicalRates=true});
  Object.values(VEHICLES).forEach(v=>{if(v._physicalLoad)return;v.load=Math.round(v.load*1000);v._physicalLoad=true});
}
function migratePhysicalState(){
  if(state.physicalUnitsVersion===PHYSICAL_UNITS_VERSION){state.totalDeliveredKg=Number(state.totalDeliveredKg)||0;return}
  CITIES.forEach(c=>{const s=state.cities[c.id];s.inventory=s.inventory||{};for(const [g,q] of Object.entries(s.inventory))s.inventory[g]=roundCargo((Number(q)||0)*(LEGACY_CARGO_KG[g]||1000));s.demands=s.demands||{};for(const [g,d] of Object.entries(s.demands)){const factor=LEGACY_CARGO_KG[g]||1000;d.need=roundCargo((Number(d.need)||0)*factor);d.max=roundCargo((Number(d.max)||0)*factor)}});
  state.shipments=(state.shipments||[]).map(sh=>({...sh,amount:sh.good?roundCargo((Number(sh.amount)||0)*(LEGACY_CARGO_KG[sh.good]||1000)):0,returnAmount:sh.returnGood?roundCargo((Number(sh.returnAmount)||0)*(LEGACY_CARGO_KG[sh.returnGood]||1000)):0}));
  state.routes=(state.routes||[]).map(r=>({...r,amountPerDay:roundCargo((Number(r.amountPerDay)||0)*(LEGACY_CARGO_KG[r.good]||1000)),returnAmount:r.returnGood?roundCargo((Number(r.returnAmount)||0)*(LEGACY_CARGO_KG[r.returnGood]||1000)):0,lastStatus:'Bereit nach Einheiten-Update'}));
  state.totalDeliveredKg=Number(state.totalDeliveredKg)||((Number(state.totalDelivered)||0)*1000);state.physicalUnitsVersion=PHYSICAL_UNITS_VERSION;save(false)
}
function ensurePhysicalFishState(){
  state.fleet=state.fleet||{};if(!Number.isFinite(state.fleet.reefer))state.fleet.reefer=0;
  CITIES.forEach(c=>{const s=state.cities[c.id];s.inventory=s.inventory||{};if(!Number.isFinite(s.inventory.fish))s.inventory.fish=0;s.demands=s.demands||{};if(!s.demands.fish){const oldMax=Math.max(3,2+c.tier);s.demands.fish={need:0,max:state.physicalUnitsVersion===PHYSICAL_UNITS_VERSION?oldMax*LEGACY_CARGO_KG.fish:oldMax,mult:+(1.1+c.tier*.12).toFixed(2)}}});
  const nextDayBtn=document.getElementById('nextDayBtn');if(nextDayBtn)nextDayBtn.textContent='Tag beenden'
}
applyPhysicalConstants();migratePhysicalState();ensurePhysicalFishState();

function produceHourly(){let summary={made:0,blocked:0};for(const c of CITIES){const s=state.cities[c.id];if(!s.unlocked)continue;for(const fid of s.facilities){const f=FACILITIES[fid];let ok=true;for(const [g,q] of Object.entries(f.inputs||{}))if((s.inventory[g]||0)+.0001<q/24)ok=false;if(!ok){summary.blocked++;continue}for(const [g,q] of Object.entries(f.inputs||{}))s.inventory[g]=roundCargo((s.inventory[g]||0)-q/24);for(const [g,q] of Object.entries(f.output||{})){const made=q/24;s.inventory[g]=roundCargo((s.inventory[g]||0)+made);summary.made+=made}}}summary.made=roundCargo(summary.made);return summary}
function produce(){return produceHourly()}
function sellDemand(){let revenue=0,units=0;for(const c of CITIES){const s=state.cities[c.id];if(!s.unlocked)continue;for(const [g,d] of Object.entries(s.demands)){const have=s.inventory[g]||0,qty=Math.min(have,d.need);if(qty>.0001){const rev=Math.round(qty*(GOODS[g]?.price||0)*d.mult);s.inventory[g]=roundCargo(have-qty);d.need=roundCargo(d.need-qty);revenue+=rev;units+=qty;s.sales+=rev}}}units=roundCargo(units);state.cash+=revenue;state.totalRevenue+=revenue;state.totalDeliveredKg=(state.totalDeliveredKg||0)+units;state.totalDelivered=state.totalDeliveredKg;state.reputation+=Math.floor(units/4000);return{revenue,units}}
function finishDay(){const sales=sellDemand(),fac=Object.values(state.cities).reduce((n,c)=>n+c.facilities.length,0),networkMaint=state.connections.reduce((s,e)=>s+e.maintenance,0),fleetMaint=Object.entries(state.fleet).reduce((sum,[id,n])=>sum+n*(VEHICLES[id]?.daily||0),0),maintenance=networkMaint+fac*550+fleetMaint;state.cash-=maintenance;state.day++;replenishDemand();const auto=runPersistentRoutes();state.history.push({day:state.day,revenue:sales.revenue,maintenance});if(state.history.length>30)state.history.shift();return {sales,prod:{made:0,blocked:0},maintenance,auto}}
function advanceMinutes(minutes,{quiet=false,live=false}={}){let arrivals=0,prodMade=0,prodBlocked=0,salesUnits=0,salesRevenue=0,autoSent=0,autoBlocked=0,maintenance=0,dayWraps=0,stateChanged=false;for(let i=0;i<minutes;i++){const before=shipmentStateSignature(),done=processShipments(1);arrivals+=done.length;state.minute++;if(state.minute>=60){state.minute=0;state.hour++;const hourly=produceHourly();prodMade+=hourly.made;prodBlocked+=hourly.blocked;if(hourly.made||hourly.blocked)stateChanged=true}if(state.hour>=24){state.hour=0;const daily=finishDay();dayWraps++;autoSent+=daily.auto.sent;autoBlocked+=daily.auto.blocked;salesUnits+=daily.sales.units;salesRevenue+=daily.sales.revenue;maintenance+=daily.maintenance;stateChanged=true}if(before!==shipmentStateSignature()||done.length)stateChanged=true}playTick+=minutes;if(!live||playTick%10===0)save(false);refreshLiveTimeUi(!live||stateChanged);if(!quiet||arrivals||dayWraps){const parts=[formatClock(state.day,state.hour,state.minute)];if(arrivals)parts.push(`${arrivals} Rundfahrt(en) abgeschlossen`);if(prodMade)parts.push(`${formatWeight(prodMade)} produziert`);if(prodBlocked)parts.push(`${prodBlocked} Betrieb(e) ohne Vorprodukte`);if(autoSent)parts.push(`${formatWeight(autoSent)} automatisch versendet`);if(autoBlocked)parts.push(`${autoBlocked} Dauerroute(n) blockiert`);if(salesUnits)parts.push(`${formatWeight(salesUnits)} am Tagesende verkauft für ${money(salesRevenue)}`);if(maintenance)parts.push(`${money(maintenance)} Unterhalt`);toast(parts.join(' · '),(salesRevenue>maintenance&&dayWraps>0)?'good':'')}if(state.cash<0)toast('Achtung: Dein Unternehmen ist überschuldet. Verkaufe dringend Waren.','bad')}

function ensureFacilityConfigs(cityState){
  cityState.facilityConfigs=Array.isArray(cityState.facilityConfigs)?cityState.facilityConfigs:[];
  while(cityState.facilityConfigs.length<cityState.facilities.length)cityState.facilityConfigs.push(null);
  if(cityState.facilityConfigs.length>cityState.facilities.length)cityState.facilityConfigs.length=cityState.facilities.length;
  return cityState.facilityConfigs;
}
function normalizedFoodMix(config){return clamp(Math.round(Number(config?.meatPct ?? 50)/5)*5,0,100)}
function normalizedFoodFactoryMix(config){
  let values;
  if(Number.isFinite(Number(config?.vegPct))||Number.isFinite(Number(config?.tomatoPct))){
    values=[Number(config?.meatPct)||0,Number(config?.vegPct)||0,Number(config?.tomatoPct)||0];
  }else if(config?.mode==='tomato') values=[0,0,100];
  else{const meat=normalizedFoodMix(config);values=[meat,100-meat,0]}
  values=values.map(v=>clamp(Number(v)||0,0,100));
  let sum=values.reduce((a,b)=>a+b,0);if(sum<=0)values=[50,50,0],sum=100;
  const scaled=values.map(v=>v/sum*100),floored=scaled.map(v=>Math.floor(v/5)*5);
  let remaining=100-floored.reduce((a,b)=>a+b,0);
  const order=[0,1,2].sort((a,b)=>(scaled[b]-floored[b])-(scaled[a]-floored[a]));
  let i=0;while(remaining>0){floored[order[i%3]]+=5;remaining-=5;i++}
  return{meatPct:floored[0],vegPct:floored[1],tomatoPct:floored[2]};
}
function foodFactoryRecipe(config){
  const mix=normalizedFoodFactoryMix(config),inputs={},outputs={};
  const recipes=[
    {pct:mix.meatPct,recipe:hfRecipeFromPack('foodfactory_meat')},
    {pct:mix.vegPct,recipe:hfRecipeFromPack('foodfactory_veg')},
    {pct:mix.tomatoPct,recipe:hfRecipeFromPack('foodfactory_tomato')}
  ];
  for(const item of recipes){const factor=item.pct/100;if(!factor)continue;for(const [g,q] of Object.entries(item.recipe.inputs||{}))inputs[g]=(inputs[g]||0)+q*factor;for(const [g,q] of Object.entries(item.recipe.outputs||{}))outputs[g]=(outputs[g]||0)+q*factor}
  for(const obj of [inputs,outputs])for(const g of Object.keys(obj)){obj[g]=roundCargo(obj[g]);if(obj[g]<.0001)delete obj[g]}
  return{...mix,inputs,outputs};
}
function facilityRecipe(cityState,index,fid){
  if(fid==='foodfactory')return foodFactoryRecipe(ensureFacilityConfigs(cityState)[index]);
  const f=FACILITIES[fid];return f?{inputs:f.inputs||{},outputs:f.output||{}}:{inputs:{},outputs:{}};
}

}

}

produceHourly=function(){
  let summary={made:0,blocked:0};
  for(const c of CITIES){
    const s=state.cities[c.id];if(!s.unlocked)continue;ensureFacilityConfigs(s);
    s.facilities.forEach((fid,index)=>{
      const f=FACILITIES[fid];if(!f)return;const recipe=facilityRecipe(s,index,fid),hourInputs={},hourOutputs={};
      for(const [g,q] of Object.entries(recipe.inputs||{}))hourInputs[g]=q/24;
      for(const [g,q] of Object.entries(recipe.outputs||{}))hourOutputs[g]=q/24;
      let ok=true;for(const [g,q] of Object.entries(hourInputs))if((s.inventory[g]||0)+.0001<q)ok=false;
      if(!ok){summary.blocked++;return}
      for(const [g,q] of Object.entries(hourInputs))s.inventory[g]=roundCargo((s.inventory[g]||0)-q);
      for(const [g,q] of Object.entries(hourOutputs)){s.inventory[g]=roundCargo((s.inventory[g]||0)+q);summary.made+=q}
    });
  }
  summary.made=roundCargo(summary.made);return summary;
};

  state.fleet=state.fleet||{};
  state.usedVehicles=state.usedVehicles||{};
  if(!Number.isFinite(state.fleet.tipper)) state.fleet.tipper=0;
  if(!Number.isFinite(state.usedVehicles.tipper)) state.usedVehicles.tipper=0;

const HF_BULK_GOODS = new Set(['grain','ore','aluminum_ore']);
vehicleCanCarryGood = function(vehicleId,goodId){
  if(!vehicleId||!goodId||!GOODS[goodId]) return true;
  // Refrigerated goods need a dedicated refrigerated truck.
  if(goodId==='fish' || goodId==='pork') return vehicleId==='reefer';
  // Live animals need an appropriate livestock-capable vehicle.
  if(goodId==='pigs') return ['lightTruck','heavyTruck','artic','freightTrain'].includes(vehicleId);
  // Loose bulk cargo is reserved for the tipper truck on roads; rail remains possible.
  if(HF_BULK_GOODS.has(goodId)) return vehicleId==='tipper' || vehicleId==='freightTrain';
  // Tippers carry bulk cargo only, reefers carry chilled cargo only.
  if(vehicleId==='tipper' || vehicleId==='reefer') return false;
  return true;
};

function migrateBulkRoutesToTipperRules(){
  for(const r of state.routes||[]){
    if(HF_BULK_GOODS.has(r.good)&&!['tipper','freightTrain'].includes(r.vehicleType)){
      r.active=false;
      r.lastStatus='Pausiert: Schüttgut benötigt Kipplaster oder Güterzug';
    }
    if(r.returnGood&&HF_BULK_GOODS.has(r.returnGood)&&!['tipper','freightTrain'].includes(r.vehicleType)){
      r.active=false;
      r.lastStatus='Pausiert: Rückfracht ist Schüttgut und benötigt Kipplaster oder Güterzug';
    }
  }
}

// --- v1.0.10: weekdays, scheduled permanent routes and vehicle timetable ---
const HF_WEEKDAYS=['Mo','Di','Mi','Do','Fr','Sa','So'];
const HF_WEEK_MINUTES=7*24*60;
function weekdayIndex(day=state.day){return ((Math.max(1,Number(day)||1)-1)%7+7)%7}
function weekdayName(day=state.day){return HF_WEEKDAYS[weekdayIndex(day)]}
function minuteOfDay(hour=state.hour,minute=state.minute){return clamp((Number(hour)||0)*60+(Number(minute)||0),0,1439)}
function parseClockMinutes(value){const m=/^(\d{1,2}):(\d{2})$/.exec(String(value||''));if(!m)return 8*60;return clamp((+m[1])*60+(+m[2]),0,1439)}
function clockFromMinutes(value){const n=((Math.floor(Number(value)||0)%1440)+1440)%1440;return `${String(Math.floor(n/60)).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`}
function routeScheduleDays(route){const days=Array.isArray(route?.scheduleDays)?route.scheduleDays.map(Number).filter(x=>x>=0&&x<7):[0,1,2,3,4,5,6];return [...new Set(days)].sort((a,b)=>a-b)}
function routeDepartureMinute(route){return clamp(Number(route?.departureMinute??0)||0,0,1439)}
function routeDurationMinutes(route){const timing=routeTiming(route.from,route.to,route.vehicleType);return Math.max(1,Math.round((timing.round||0)*60)||Number(route.durationMinutes)||60)}
function routeScheduleLabel(route){const days=routeScheduleDays(route).map(d=>HF_WEEKDAYS[d]).join(', ');return `${days} · ${clockFromMinutes(routeDepartureMinute(route))}`}
function nextDepartureInfo(route){const nowDay=weekdayIndex(),nowMinute=minuteOfDay(),days=routeScheduleDays(route),depart=routeDepartureMinute(route);let best=null;for(let offset=0;offset<=7;offset++){const wd=(nowDay+offset)%7;if(!days.includes(wd))continue;if(offset===0&&depart<=nowMinute)continue;const delta=offset*1440+depart-nowMinute;if(best===null||delta<best)best=delta}if(best===null){const wd=days[0]??0;best=((wd-nowDay+7)%7||7)*1440+depart-nowMinute}const targetWd=(nowDay+Math.floor((nowMinute+best)/1440))%7;const parts=[];if(best>=1440)parts.push(`${Math.floor(best/1440)} T`);const rem=best%1440;if(rem>=60)parts.push(`${Math.floor(rem/60)} Std.`);if(rem%60)parts.push(`${rem%60} Min.`);return{delta:best,label:`${HF_WEEKDAYS[targetWd]} ${clockFromMinutes((nowMinute+best)%1440)}`,relative:parts.join(' ')||'jetzt'}}
formatClock=function(day,hour,minute=0){return `${weekdayName(day)} · Tag ${day} · ${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`};

function ensureRouteSchedules(){
  for(const route of state.routes||[]){
    if(!Array.isArray(route.scheduleDays)||!route.scheduleDays.length)route.scheduleDays=[0,1,2,3,4,5,6];
    route.scheduleDays=routeScheduleDays(route);
    if(!Number.isFinite(route.departureMinute))route.departureMinute=0;
    route.departureMinute=routeDepartureMinute(route);
    route.durationMinutes=routeDurationMinutes(route);
    if(typeof route.lastRunKey!=='string')route.lastRunKey='';
  }
  state.weekScheduleVersion=1;
}

function addRouteMinutes(occupancy,start,duration,count){let cursor=((Math.floor(start)%HF_WEEK_MINUTES)+HF_WEEK_MINUTES)%HF_WEEK_MINUTES;const total=Math.min(HF_WEEK_MINUTES,Math.max(1,Math.ceil(duration)));for(let i=0;i<total;i++){occupancy[cursor]+=count;cursor=(cursor+1)%HF_WEEK_MINUTES}}
function weeklyVehicleOccupancy(vehicleId,excludeId=null){const occupancy=new Uint16Array(HF_WEEK_MINUTES);for(const r of state.routes||[]){if(!r.active||r.vehicleType!==vehicleId||r.id===excludeId)continue;const duration=routeDurationMinutes(r),count=Math.max(1,Math.floor(r.vehicleCount||1));for(const day of routeScheduleDays(r))addRouteMinutes(occupancy,day*1440+routeDepartureMinute(r),duration,count)}return occupancy}
function scheduleCapacityCheck(vehicleId,day,departureMinute,duration,count,excludeId=null){const owned=Math.max(0,state.fleet?.[vehicleId]||0),occ=weeklyVehicleOccupancy(vehicleId,excludeId);let peak=0,firstConflict=-1,cursor=day*1440+departureMinute;for(let i=0;i<Math.max(1,Math.ceil(duration));i++){const at=((cursor+i)%HF_WEEK_MINUTES+HF_WEEK_MINUTES)%HF_WEEK_MINUTES,used=occ[at]+count;peak=Math.max(peak,used);if(firstConflict<0&&used>owned)firstConflict=at}return{ok:firstConflict<0,owned,peak,firstConflict}}

function splitWeeklyBlock(start,duration){const blocks=[];let cursor=((start%HF_WEEK_MINUTES)+HF_WEEK_MINUTES)%HF_WEEK_MINUTES,remaining=Math.min(HF_WEEK_MINUTES,Math.max(1,Math.ceil(duration)));while(remaining>0){const day=Math.floor(cursor/1440),minute=cursor%1440,chunk=Math.min(remaining,1440-minute,HF_WEEK_MINUTES-cursor);blocks.push({day,start:minute,end:minute+chunk});remaining-=chunk;cursor=(cursor+chunk)%HF_WEEK_MINUTES}return blocks}
function timetableBlocks(vehicleId,excludeId=null){const out=[];for(const r of state.routes||[]){if(!r.active||r.vehicleType!==vehicleId||r.id===excludeId)continue;const duration=routeDurationMinutes(r);for(const day of routeScheduleDays(r)){for(const b of splitWeeklyBlock(day*1440+routeDepartureMinute(r),duration))out.push({...b,count:r.vehicleCount||1,label:`${CITY[r.from]?.name||''}–${CITY[r.to]?.name||''}`,routeId:r.id})}}return out}
function routeTimetableMarkup(vehicleId,preview=null,excludeId=null){const v=VEHICLES[vehicleId],blocks=timetableBlocks(vehicleId,excludeId),owned=state.fleet?.[vehicleId]||0;let previewBlocks=[];if(preview&&Number.isFinite(preview.day)&&Number.isFinite(preview.minute)&&preview.duration){previewBlocks=splitWeeklyBlock(preview.day*1440+preview.minute,preview.duration).map(b=>({...b,count:preview.count||1,label:'Neue Route',preview:true,conflict:!!preview.conflict}))}const rows=HF_WEEKDAYS.map((day,i)=>{const all=[...blocks.filter(b=>b.day===i),...previewBlocks.filter(b=>b.day===i)];return `<div class="hf-time-row"><b>${day}</b><div class="hf-time-track">${all.map(b=>{const left=b.start/14.4,width=Math.max(.6,(b.end-b.start)/14.4),title=`${b.label} · ${clockFromMinutes(b.start)}–${clockFromMinutes(b.end%1440)} · ${b.count} Fz.`;return `<i class="hf-time-block ${b.preview?'preview':''} ${b.conflict?'conflict':''}" style="left:${left}%;width:${width}%" title="${escAttr(title)}"><span>${b.count}×</span></i>`}).join('')}</div></div>`}).join('');return `<div class="hf-timetable"><div class="hf-timetable-head"><b>${v?.icon||'🚚'} ${v?.name||'Fahrzeug'}</b><span>${owned} vorhanden · Grau = belegt</span></div><div class="hf-time-scale"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>${rows}</div>`}
function routeTimetableOverview(){const ids=[...new Set((state.routes||[]).filter(r=>r.active).map(r=>r.vehicleType))];if(!ids.length)return `<div class="compact-note">Noch keine belegten Zeitfenster.</div>`;return ids.map(id=>routeTimetableMarkup(id)).join('')}

function ensureFreshCropState(){
  for(const c of CITIES){
    const s=state.cities[c.id];if(!s)continue;
    s.inventory=s.inventory||{};s.demands=s.demands||{};
    for(const g of ['zucchini','apples','potatoes'])if(!Number.isFinite(s.inventory[g]))s.inventory[g]=0;
    const specs={
      zucchini:{max:1400+c.tier*650,mult:.94+c.tier*.035},
      apples:{max:1600+c.tier*750,mult:.96+c.tier*.035},
      potatoes:{max:2600+c.tier*1100,mult:.92+c.tier*.03}
    };
    for(const [g,x] of Object.entries(specs)){
      if(!s.demands[g])s.demands[g]={need:roundCargo(x.max*.55),max:roundCargo(x.max),mult:+x.mult.toFixed(2)};
      else{
        s.demands[g].need=roundCargo(Math.max(0,Number(s.demands[g].need)||0));
        s.demands[g].max=roundCargo(Math.max(1,Number(s.demands[g].max)||x.max));
        s.demands[g].mult=Number(s.demands[g].mult)||+x.mult.toFixed(2);
      }
    }
  }
  state.freshCropsVersion=HF_FRESH_CROPS_VERSION;
}
ensureFreshCropState();

const HF_BULK_CORE_V114=new Set(['grain','ore','aluminum_ore']);
const HF_FRESH_PRODUCE_V114=new Set(['tomatoes','zucchini','apples']);
vehicleCanCarryGood=function(vehicleId,goodId){
  if(!vehicleId||!goodId||!GOODS[goodId])return true;
  if(goodId==='fish'||goodId==='pork')return ['reefer'].includes(vehicleId);
  if(goodId==='pigs')return ['lightTruck','heavyTruck','artic','freightTrain'].includes(vehicleId);
  if(HF_BULK_CORE_V114.has(goodId))return ['tipper','freightTrain'].includes(vehicleId);
  if(goodId==='potatoes')return ['van','lightTruck','heavyTruck','artic','tipper','freightTrain'].includes(vehicleId);
  if(HF_FRESH_PRODUCE_V114.has(goodId))return ['van','lightTruck','heavyTruck','artic','reefer','freightTrain'].includes(vehicleId);
  if(vehicleId==='tipper')return false;
  if(vehicleId==='reefer')return false;
  return true;
};

  }

const HF_AUTO_JUNCTION_JOIN_KM_V130=0.12;

const HF_AUTO_JUNCTION_ENDPOINT_KM_V130=0.18;

function hfRoadComponentEdgesV130(originId){
  const roads=state.connections.filter(e=>isRoadType(e.type));
  const reached=new Set([originId]);
  let changed=true;
  while(changed){
    changed=false;
    for(const e of roads){
      if(reached.has(e.a)&&!reached.has(e.b)){reached.add(e.b);changed=true}
      else if(reached.has(e.b)&&!reached.has(e.a)){reached.add(e.a);changed=true}

}
function hfGeometryCumulativeV130(coords){
  const out=[0];
  for(let i=1;i<coords.length;i++)out[i]=out[i-1]+dist({lat:coords[i-1][0],lng:coords[i-1][1]},{lat:coords[i][0],lng:coords[i][1]});

    const j=routeIndex-back,span=hfPointDistanceV130(routeCoords[j],routeCoords[routeIndex]);

    const prevPoint={lat:routeCoords[j][0],lng:routeCoords[j][1]},prevHit=closestPointOnGeometry(prevPoint,edgeCoords);

// --- v1.1.5: durable persistence across Android app closes ---
const HF_PERSIST_DB='helveticFreightPersistentStore';
const HF_PERSIST_STORE='saves';
let hfPersistDbPromise=null;
let hfPersistReady=false;
let hfPersistentSaveAvailable=false;
let hfLastStateFingerprint='';
let hfWriteChain=Promise.resolve();

function hfOpenPersistentDb(){
  if(hfPersistDbPromise)return hfPersistDbPromise;
  hfPersistDbPromise=new Promise((resolve,reject)=>{
    let settled=false;
    const finish=(ok,value)=>{if(settled)return;settled=true;clearTimeout(timer);ok?resolve(value):reject(value)};
    const timer=setTimeout(()=>finish(false,new Error('IndexedDB antwortet nicht')),1800);
    try{
      if(!window.indexedDB)return finish(false,new Error('IndexedDB ist nicht verfügbar'));
      const request=indexedDB.open(HF_PERSIST_DB,1);
      request.onupgradeneeded=()=>{
        const db=request.result;
        if(!db.objectStoreNames.contains(HF_PERSIST_STORE))db.createObjectStore(HF_PERSIST_STORE);
      };
      request.onsuccess=()=>finish(true,request.result);
      request.onerror=()=>finish(false,request.error||new Error('IndexedDB konnte nicht geöffnet werden'));
      request.onblocked=()=>finish(false,new Error('IndexedDB ist blockiert'));
    }catch(err){finish(false,err)}
  });
  return hfPersistDbPromise;
}
function hfIdbGet(key){
  return hfOpenPersistentDb().then(db=>new Promise((resolve,reject)=>{
    try{
      const tx=db.transaction(HF_PERSIST_STORE,'readonly');
      const req=tx.objectStore(HF_PERSIST_STORE).get(key);
      req.onsuccess=()=>resolve(req.result??null);
      req.onerror=()=>reject(req.error||new Error('Persistenter Spielstand konnte nicht gelesen werden'));
    }catch(err){reject(err)}
  }));
}
function hfIdbSet(key,value){
  return hfOpenPersistentDb().then(db=>new Promise((resolve,reject)=>{
    try{
      const tx=db.transaction(HF_PERSIST_STORE,'readwrite');
      tx.objectStore(HF_PERSIST_STORE).put(String(value),key);
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>reject(tx.error||new Error('Persistenter Spielstand konnte nicht geschrieben werden'));
      tx.onabort=()=>reject(tx.error||new Error('Persistentes Speichern wurde abgebrochen'));
    }catch(err){reject(err)}
  }));
}
function hfIdbDeleteAll(){
  return hfOpenPersistentDb().then(db=>new Promise((resolve,reject)=>{
    try{
      const tx=db.transaction(HF_PERSIST_STORE,'readwrite');
      tx.objectStore(HF_PERSIST_STORE).clear();
      tx.oncomplete=()=>resolve(true);
      tx.onerror=()=>reject(tx.error||new Error('Persistenter Spielstand konnte nicht gelöscht werden'));
      tx.onabort=()=>reject(tx.error||new Error('Löschen wurde abgebrochen'));
    }catch(err){reject(err)}
  })).catch(()=>false);
}
function hfRawEnvelopeInfo(raw){
  if(!raw)return null;
  try{
    const parsed=JSON.parse(raw),candidate=parsed?.state&&typeof parsed.state==='object'?parsed.state:parsed;
    if(!hfStateIsStructurallyValid(candidate))return null;

  }catch(_){return null}

function hfStateFingerprint(value){
  try{return JSON.stringify(value)}catch(_){return ''}
}
function hfCreateEnvelope(value){
  return JSON.stringify({schemaVersion:HF_SAVE_SCHEMA,buildVersion:'1.1.10',savedAt:new Date().toISOString(),state:value});

function hfQueuePersistentWrite(payload){
  hfWriteChain=hfWriteChain.then(async()=>{
    try{
      const previous=await hfIdbGet('primary').catch(()=>null);
      if(previous&&previous!==payload)await hfIdbSet('backup1',previous);
      await hfIdbSet('primary',payload);
      await hfIdbSet('lastGood',payload);

    }catch(err){
      console.warn('IndexedDB-Sicherung nicht möglich',err);

// Replace the old save routine. The synchronous localStorage copy stays as a fast cache;
// IndexedDB is the durable copy used when Android closes the WebView.

    const snapshot=hfClone(state),fingerprint=hfStateFingerprint(snapshot);

    let localOk=true;

      const current=hfSafeGet(HF_SAVE_KEY);
      if(current){
        const backup1=hfSafeGet(HF_SAVE_BACKUP_1_KEY);
        if(backup1)hfSafeSet(HF_SAVE_BACKUP_2_KEY,backup1);

function hfInstallBundledEmptySave(){
  const keys=[HF_SAVE_KEY,HF_SAVE_LAST_GOOD_KEY,HF_SAVE_BACKUP_1_KEY,HF_SAVE_BACKUP_2_KEY];
  const valid=keys.some(key=>{try{return !!hfRawEnvelopeInfo(hfSafeGet(key))}catch(_){return false}});
  if(valid)return false;
  for(const key of [HF_SAVE_KEY,HF_SAVE_TEMP_KEY,HF_SAVE_LAST_GOOD_KEY,HF_SAVE_BACKUP_1_KEY,HF_SAVE_BACKUP_2_KEY])hfSafeRemove(key);
  const primaryOk=hfSafeSet(HF_SAVE_KEY,HF_BUNDLED_EMPTY_SAVE);
  const lastGoodOk=hfSafeSet(HF_SAVE_LAST_GOOD_KEY,HF_BUNDLED_EMPTY_SAVE);
  hfPersistentSaveAvailable=!!(primaryOk||lastGoodOk);
  return true;
}

async function hfRestoreBestPersistentState(){
  const localCandidates=[HF_SAVE_KEY,HF_SAVE_LAST_GOOD_KEY,HF_SAVE_BACKUP_1_KEY,HF_SAVE_BACKUP_2_KEY]
    .map(key=>hfRawEnvelopeInfo(hfSafeGet(key))).filter(Boolean);
  let idbCandidates=[];
  try{
    const raws=await Promise.all(['primary','lastGood','backup1'].map(key=>hfIdbGet(key).catch(()=>null)));
    idbCandidates=raws.map(hfRawEnvelopeInfo).filter(Boolean);
    hfPersistReady=true;
  }catch(err){
    hfPersistReady=false;
    console.warn('Persistenter App-Speicher nicht verfügbar',err);
  }
  const candidates=[...localCandidates,...idbCandidates].sort((a,b)=>b.savedAt-a.savedAt);
  hfPersistentSaveAvailable=candidates.length>0;
  if(!candidates.length)return false;
  for(const candidate of candidates){
    try{
      const migrated=migrateState(hfClone(candidate.state));
      if(!hfStateIsStructurallyValid(migrated))continue;
      state=migrated;
      hfLastStateFingerprint=hfStateFingerprint(state);
      return true;
    }catch(err){console.warn('Gesicherter Spielstand war nicht kompatibel',err)}
  }
  return false;
}
function hfUpdateTitleInfo(){
  const load=document.getElementById('hfTitleLoad'),info=document.getElementById('hfTitleSaveInfo');
  if(load)load.disabled=!hfPersistentSaveAvailable;
  if(info)info.textContent=hfPersistentSaveAvailable
    ?`Gespeichert: Tag ${Math.max(1,Number(state.day)||1)} · ${money(Number(state.cash)||0)} · ${(state.depots||[]).length} Depot${(state.depots||[]).length===1?'':'s'}`
    :'Noch kein Spielstand vorhanden.';
}
function hfInstallStableTitleController(){
  const screen=document.getElementById('hfTitleScreen');if(!screen)return;
  document.documentElement.classList.add('hf-title-open');
  const oldNew=document.getElementById('hfTitleNew'),oldLoad=document.getElementById('hfTitleLoad');
  const info=document.getElementById('hfTitleSaveInfo'),note=document.getElementById('hfTitleResetNote');
  const version=screen.querySelector('.hf-title-version');
  if(version)version.textContent='Version 1.1.10 · Vorinstallierter Startspielstand';
  if(note)note.textContent='Ein leerer Startspielstand ist bereits enthalten. „Spiel laden“ startet Tag 1; „Neues Spiel“ setzt jederzeit wieder genau auf diesen Stand zurück.';
  if(info)info.textContent='Spielstand wird geprüft …';
  if(oldNew){
    const newBtn=oldNew.cloneNode(true);oldNew.replaceWith(newBtn);
    newBtn.disabled=false;
    newBtn.addEventListener('click',async()=>{
      if(hfPersistentSaveAvailable&&!confirm('Neues Spiel starten? Der aktuelle Spielstand wird vollständig ersetzt.'))return;
      newBtn.disabled=true;newBtn.innerHTML='<span>⟳</span> Neues Spiel wird gestartet …';
      try{
        stopPlay?.();
        for(const key of [HF_SAVE_KEY,HF_SAVE_TEMP_KEY,HF_SAVE_LAST_GOOD_KEY,HF_SAVE_BACKUP_1_KEY,HF_SAVE_BACKUP_2_KEY])hfSafeRemove(key);
        await hfIdbDeleteAll();
        location.hash='hf-new-game-v110';
        location.reload();
      }catch(err){newBtn.disabled=false;newBtn.innerHTML='<span>＋</span> Neues Spiel';hfShowFatalBootError(err)}
    });
  }
  if(oldLoad){
    const loadBtn=oldLoad.cloneNode(true);oldLoad.replaceWith(loadBtn);
    loadBtn.disabled=!hfPersistentSaveAvailable;
    loadBtn.addEventListener('click',()=>{if(hfPersistentSaveAvailable)hfCloseTitle()});
  }
  hfUpdateTitleInfo();
}
function hfInstallAutosaveHooks(){
  if(window.__HF_AUTOSAVE_INSTALLED__)return;
  window.__HF_AUTOSAVE_INSTALLED__=true;
  let lastAuto=0,scheduled=null;
  const autosave=(force=false)=>{
    if(!window.__HF_BOOT_COMPLETE__)return false;
    const now=Date.now();
    if(!force&&now-lastAuto<800)return false;
    lastAuto=now;
    return save(false);
  };
  const schedule=()=>{
    if(scheduled)clearTimeout(scheduled);
    scheduled=setTimeout(()=>{scheduled=null;autosave(false)},450);
  };
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')autosave(true)},{passive:true});
  window.addEventListener('pagehide',()=>autosave(true),{passive:true});
  window.addEventListener('blur',()=>autosave(true),{passive:true});
  window.addEventListener('freeze',()=>autosave(true),{passive:true});
  document.addEventListener('click',()=>setTimeout(schedule,0),{passive:true});
  document.addEventListener('change',schedule,{passive:true});
  document.addEventListener('input',schedule,{passive:true});
  setInterval(()=>autosave(false),5000);
  window.__HF_FORCE_AUTOSAVE__=()=>autosave(true);
}

(async function hfBootV110(){
  try{
    const isExplicitNewGame=location.hash==='#hf-new-game-v110'||location.hash==='#hf-new-game-v115';
    const installedBundledStart=hfInstallBundledEmptySave();
    const restored=await hfRestoreBestPersistentState();
    const createdEmpty=!restored;
    if(createdEmpty){
      const bundledInfo=hfRawEnvelopeInfo(HF_BUNDLED_EMPTY_SAVE);
      state=bundledInfo?migrateState(hfClone(bundledInfo.state)):freshState();
      hfLastStateFingerprint='';
    }
    if(!hfStateIsStructurallyValid(state))throw new Error('Initialer Spielzustand unvollständig');
    hfV117AfterStateRestore();
    renderAll();
    const content=document.getElementById('content');
    if(!content||!content.childNodes.length)throw new Error('Hauptmenü wurde nicht gerendert');
    window.__HF_BOOT_COMPLETE__=true;
    document.documentElement.dataset.hfVersion='1.1.11';
    document.body.dataset.hfBuild='1.1.11';
    window.HF={...window.HF,
      bundledEmptySave:HF_BUNDLED_EMPTY_SAVE,
      resetToBundledStart:async()=>{for(const key of [HF_SAVE_KEY,HF_SAVE_TEMP_KEY,HF_SAVE_LAST_GOOD_KEY,HF_SAVE_BACKUP_1_KEY,HF_SAVE_BACKUP_2_KEY])hfSafeRemove(key);await hfIdbDeleteAll();hfInstallBundledEmptySave();location.reload()},
      stability:{schema:HF_SAVE_SCHEMA,key:HF_SAVE_KEY,transactional:true,backups:3,indexedDb:true,autosave:true,emptySaveBootstrap:true,bundledEmptySave:true,autosaveIntervalMs:5000},
      forceAutosave:()=>window.__HF_FORCE_AUTOSAVE__?.(),
      restoreLastGood:async function(){
        const raw=(await hfIdbGet('lastGood').catch(()=>null))||hfSafeGet(HF_SAVE_LAST_GOOD_KEY);if(!raw)return false;
        const info=hfRawEnvelopeInfo(raw);if(!info)return false;
        const recovered=migrateState(hfClone(info.state));if(!hfStateIsStructurallyValid(recovered))return false;
        state=recovered;renderAll();hfLastStateFingerprint='';save(false);return true;
      }
    };
    hfInstallAutosaveHooks();
    if(isExplicitNewGame){
      try{history.replaceState(null,'',location.href.split('#')[0])}catch(_){location.hash=''}
    }
    // Always write a valid save immediately. On a fresh install this creates the
    // empty initial save before the player can close or background the app.
    hfLastStateFingerprint='';
    const initialSaved=save(false);
    hfPersistentSaveAvailable=!!initialSaved||hfPersistentSaveAvailable;
    hfUpdateTitleInfo();
    hfInstallStableTitleController();
    // The bundled start save deliberately remains on the title screen so the
    // player can see that a loadable game is present before entering it.
  }catch(err){
    window.__HF_BOOT_COMPLETE__=false;
    hfShowFatalBootError(err);
  }
})();

  function buyVehicle(type,id,vehicleType){const v=VEHICLES[vehicleType],cfg=sourceCfg(type,id);if(!v||!cfg||v.mode!=='road')return;if(state.cash<v.cost)return toast('Zu wenig Kapital.','bad');state.cash-=v.cost;cfg.fleet[vehicleType]=(Number(cfg.fleet[vehicleType])||0)+1;replanSupply(true);save(false);renderAll();openSourceLogistics(type,id);toast(`${v.name} in ${sourceName(type,id)} stationiert.`,'good')}

  const priorOpenDepot=window.HF?.hfOpenDepot;if(priorOpenDepot)window.HF.hfOpenDepot=function(id){const r=priorOpenDepot(id);for(const delay of [0,60,160])setTimeout(()=>injectDepotSourcePanel(id),delay);return r};

  function audit(){ensureSupply();const errors=[],warnings=[];for(const c of contracts()){if(!state.cities?.[c.destinationCityId])errors.push(`${c.id}: Zielstadt fehlt`);if(!GOODS[c.goodId])errors.push(`${c.id}: Ware fehlt`);if(!primarySourceValid(c))warnings.push(`${c.id}: Primärquelle ungültig`);if(c.frequency==='weekly'&&(c.weekday<0||c.weekday>6))errors.push(`${c.id}: Wochentag ungültig`)}for(const row of state.hfSupplyWeekPlan.rows||[]){if(!VEHICLES[row.vehicleType])errors.push(`${row.id}: Fahrzeug fehlt`);if(!(row.stops||[]).length)errors.push(`${row.id}: Stopps fehlen`);if(cargoTotal(row.cargo)>((VEHICLES[row.vehicleType]?.load)||0)+EPS)errors.push(`${row.id}: Fahrzeug überladen`)}return {ok:errors.length===0,build:BUILD,schema:SCHEMA,contracts:contracts().length,plannedRows:(state.hfSupplyWeekPlan.rows||[]).length,cityFleetSources:Object.keys(state.sourceLogistics.cities||{}).length,errors,warnings}}

<script id="hf-visible-save-tools-v1138">
(function(){
  'use strict';
  function call(name){
    return function(){
      try{
        const fn=window.HF&&window.HF[name];
        if(typeof fn==='function')fn();
      }catch(err){console.warn('Spielstand-Aktion fehlgeschlagen',name,err)}
    };
  }
  function ensureTools(){
    if(document.getElementById('hfSaveTools'))return;
    const wrap=document.createElement('div');
    wrap.id='hfSaveTools';
    wrap.className='hf-save-tools';
    wrap.innerHTML='<button type="button" class="hf-save-tool" id="hfQuickSave">💾 Speichern</button><button type="button" class="hf-save-tool primary" id="hfQuickExport">⬇ Export</button><button type="button" class="hf-save-tool orange" id="hfQuickImport">⬆ Import</button>';
    document.body.appendChild(wrap);
    document.getElementById('hfQuickSave').addEventListener('click',call('save'));
    document.getElementById('hfQuickExport').addEventListener('click',call('exportSave'));
    document.getElementById('hfQuickImport').addEventListener('click',call('importSave'));
  }
  function ensureTitleTools(){
    const actions=document.querySelector('#hfTitleScreen .hf-title-actions');
    if(!actions||document.getElementById('hfTitleImport'))return;
    const exportBtn=document.createElement('button');
    exportBtn.type='button';exportBtn.id='hfTitleExport';exportBtn.className='hf-title-btn secondary';exportBtn.innerHTML='<span>⬇</span> Spielstand exportieren';
    const importBtn=document.createElement('button');
    importBtn.type='button';importBtn.id='hfTitleImport';importBtn.className='hf-title-btn secondary';importBtn.innerHTML='<span>⬆</span> Spielstand importieren';
    exportBtn.addEventListener('click',call('exportSave'));
    importBtn.addEventListener('click',call('importSave'));
    actions.append(exportBtn,importBtn);
  }
  function init(){ensureTools();ensureTitleTools()}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
  setTimeout(init,600);
  setTimeout(init,1600);
})();
</script>
